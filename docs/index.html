<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <span class="app-title">Habit Tracker</span>
    </div>
    <div class="month-nav">
      <button class="btn-nav" id="btn-prev" title="Previous month">&#8592;</button>
      <span id="month-display" class="month-label"></span>
      <button class="btn-nav" id="btn-next" title="Next month">&#8594;</button>
    </div>
    <div class="header-right">
      <button class="btn-primary" id="btn-manage-habits">Manage Habits</button>
    </div>
  </header>

  <!-- Main content -->
  <main>
    <div id="stats-bar"></div>
    <div class="heatmap-wrapper">
      <div class="heatmap-scroll">
        <table id="heatmap-table"></table>
      </div>
    </div>

    <div class="legend">
      <span class="legend-cell done"></span> Done
      <span class="legend-cell"></span> Not done
      <span class="legend-dot"></span> Has note
    </div>

    <div class="notes-bar">
      <button class="btn-notes unlock" id="btn-view-notes">&#128274; View Notes</button>
      <button class="btn-notes" id="btn-lock-notes" style="display:none">&#128275; Lock Notes</button>
    </div>
    <div id="notes-panel" style="display:none">
      <div class="notes-panel-header">
        <h3 id="notes-panel-title">Monthly Notes</h3>
      </div>
      <div id="notes-panel-list"></div>
    </div>
  </main>

  <!-- PIN Modal -->
  <div class="modal-backdrop" id="pin-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Admin Access</h2>
        <button class="btn-close" id="btn-close-pin">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field-label" for="pin-input">Enter PIN</label>
        <input type="password" id="pin-input" placeholder="••••" maxlength="30" autocomplete="off" />
        <p id="pin-error">Incorrect PIN — try again.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-pin">Cancel</button>
        <button class="btn-primary" id="btn-submit-pin">Unlock</button>
      </div>
    </div>
  </div>

  <!-- Day Modal -->
  <div class="modal-backdrop" id="day-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-date-title"></h2>
        <button class="btn-close" id="btn-close-day">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field-label" for="modal-remark">Daily note</label>
        <textarea id="modal-remark" placeholder="How did today go? Any thoughts..." rows="5"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-day">Cancel</button>
        <button class="btn-primary" id="btn-save-day">Save note</button>
      </div>
    </div>
  </div>

  <!-- Habits Modal -->
  <div class="modal-backdrop" id="habits-modal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>Manage Habits</h2>
        <button class="btn-close" id="btn-close-habits">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">Active habits appear in the tracker. Deactivated habits are hidden but their history is kept.</p>
        <div id="habits-list"></div>
        <div class="add-habit-row">
          <input type="text" id="new-habit-input" placeholder="New habit name..." maxlength="60" />
          <button class="btn-primary" id="btn-add-habit">Add</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="btn-close-habits-footer">Done</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
